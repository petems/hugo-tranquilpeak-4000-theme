{{ with .Site.Params.coverImage }}
  {{ if (in . "://") }}
    <div id="cover" style="background-image:url('{{ . | absURL }}');"></div>
  {{ else }}
    {{- $imgPath := printf "images/%s" . -}}
    {{- $img := resources.Get $imgPath -}}
    {{ if $img }}
      {{- if hugo.IsProduction -}}
        {{- $img = $img | fingerprint -}}
      {{- end -}}
      <div id="cover" style="background-image:url('{{ $img.RelPermalink }}');"></div>
    {{ else }}
      <div id="cover" style="background-image:url('{{ . | absURL }}');"></div>
    {{ end }}
  {{ end }}
{{ end }}
